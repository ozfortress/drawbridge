{% extends "admin/layout.html" %}
{% block title %}Sync - Drawbridge Admin{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Sync Management</h1>
</div>

<div class="card">
    <h2>Force Sync User</h2>
    <div class="form-group">
        <label>Discord User ID</label>
        <input type="number" id="sync-user-id" class="form-input" placeholder="e.g. 123456789012345678">
    </div>
    <button class="btn btn-primary" id="btn-force-sync">Force Sync</button>
    <div id="sync-result" class="result-box" style="display:none;"></div>
</div>

<div class="card">
    <h2>Synced Users</h2>
    <button class="btn btn-secondary" id="btn-refresh-users">Refresh</button>
    <div class="table-wrapper">
        <table class="data-table" id="users-table">
            <thead>
                <tr>
                    <th>Discord ID</th>
                    <th>Citadel ID</th>
                    <th>Steam ID</th>
                    <th>In Guild</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr><td colspan="4">Click refresh to load users.</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('btn-force-sync').addEventListener('click', async () => {
    const btn = document.getElementById('btn-force-sync');
    const result = document.getElementById('sync-result');
    btn.disabled = true; result.style.display = 'none';
    try {
        const resp = await API.post('/admin/api/sync/force', {
            discord_id: parseInt(document.getElementById('sync-user-id').value),
        });
        result.textContent = resp.message || 'Done';
        result.className = 'result-box ' + (resp.success ? 'result-success' : 'result-error');
        if (resp.success) API.toast('User synced successfully', 'success');
    } catch (e) { result.textContent = e.message; result.className = 'result-box result-error'; }
    result.style.display = 'block'; btn.disabled = false;
});

document.getElementById('btn-refresh-users').addEventListener('click', async () => {
    const tbody = document.getElementById('users-tbody');
    tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
    try {
        const resp = await API.get('/admin/api/sync/users');
        if (resp.users) {
            tbody.innerHTML = resp.users.map(u => `
                <tr>
                    <td>${u.discord_id || '—'}</td>
                    <td>${u.citadel_id || '—'}</td>
                    <td>${u.steam_id || '—'}</td>
                    <td>${u.in_guild ? '✅' : '❌'}</td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="4">No users found.</td></tr>';
        }
    } catch (e) {
        tbody.innerHTML = '<tr><td colspan="4">Error loading users.</td></tr>';
    }
});
</script>
{% endblock %}
