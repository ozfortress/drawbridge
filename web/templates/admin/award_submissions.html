{% extends "admin/layout.html" %}
{% block title %}Submissions #{{ event_id }} - Drawbridge Admin{% endblock %}
{% block extra_css %}
<style>
.team-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.75rem;
    background: var(--bg-card);
    overflow: hidden;
}
.team-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    cursor: pointer;
    gap: 0.75rem;
    flex-wrap: wrap;
}
.team-card-header:hover { background: var(--bg-input); }
.team-card-header .team-name { font-weight: 600; font-size: 0.95rem; }
.team-card-header .team-meta { font-size: 0.8rem; color: var(--text-secondary); display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
.team-card-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 1rem;
}
.team-card-body.open { display: block; }
.submission-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.submission-table th, .submission-table td {
    border: 1px solid var(--border);
    padding: 0.4rem 0.6rem;
    text-align: left;
    vertical-align: top;
}
.submission-table th { background: var(--bg-input); }
.entry-row { display: flex; flex-direction: column; gap: 0.15rem; }
.entry-row .cat-name { font-weight: 600; color: var(--accent); }
.entry-row .response-text { word-break: break-word; }
.entry-row .vote-choices { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.entry-row .vote-choice { background: var(--bg-input); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.8rem; }
.status-badge-sm { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
.status-badge-sm.accepted { background: #1a3a1a; color: #4caf50; }
.status-badge-sm.rejected { background: #3a1a1a; color: #f44336; }
.status-badge-sm.pending { background: #3a3a1a; color: #ff9800; }
.submission-meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.3rem 1rem; font-size: 0.8rem; margin-bottom: 1rem; }
.submission-meta-grid .label { color: var(--text-secondary); }
.invalidated-banner { background: #3a1a1a; border: 1px solid #f44336; border-radius: 4px; padding: 0.5rem 0.75rem; font-size: 0.8rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
.tab-bar { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 2px solid var(--border); }
.tab-btn { padding: 0.5rem 1.2rem; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
.filter-bar label { font-size: 0.85rem; color: var(--text-secondary); }
.expand-icon { font-size: 0.7rem; color: var(--text-secondary); transition: transform 0.2s; }
.expand-icon.open { transform: rotate(90deg); }
#invalidate-modal {
    display:none;position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;
}
</style>
{% endblock %}
{% block content %}
<div class="page-header">
    <a href="/admin/awards/{{ event_id }}" style="color:var(--text-secondary);font-size:0.85rem;text-decoration:none;">← Award Event</a>
    <h1 style="margin-top:0.25rem;" id="page-title">Submissions</h1>
</div>

<div class="tab-bar">
    <button class="tab-btn active" data-tab="nominations">Nominations</button>
    <button class="tab-btn" data-tab="votes">Votes</button>
</div>

<div class="filter-bar">
    <label>Division:</label>
    <select id="division-filter" class="form-input" style="width:auto;font-size:0.85rem;">
        <option value="">All Divisions</option>
    </select>
    <span id="summary-count" style="font-size:0.85rem;color:var(--text-secondary);margin-left:auto;"></span>
</div>

<div id="submissions-container"></div>

<!-- Invalidation reason modal -->
<div id="invalidate-modal">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:2rem;max-width:450px;width:90%;">
        <h3 style="margin-bottom:0.5rem;">Invalidate Submission</h3>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:0.25rem;" id="invalidate-cat-name"></p>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem;" id="invalidate-team-name"></p>
        <div id="invalidate-current-value" style="background:var(--bg-input);padding:0.5rem;border-radius:4px;font-size:0.85rem;margin-bottom:1rem;word-break:break-word;"></div>
        <textarea id="invalidate-reason" class="form-input" rows="3" style="width:100%;" placeholder="Reason for invalidation..."></textarea>
        <div class="action-grid" style="margin-top:1rem;">
            <button class="btn btn-danger" id="btn-confirm-invalidate">Invalidate</button>
            <button class="btn btn-secondary" id="btn-cancel-invalidate">Cancel</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const EVENT_ID = {{ event_id }};
const API_BASE = '/admin/api/awards';
let _currentTab = 'nominations';
let _currentData = { nominations: [], votes: [], categories: [], teams: [] };
let _invalidateTarget = null;

async function loadEvent() {
    try {
        const ev = await API.get(`${API_BASE}/events/${EVENT_ID}`);
        document.getElementById('page-title').textContent = `Submissions — ${ev.name}`;
        _currentData.categories = ev.categories || [];
        const divFilter = document.getElementById('division-filter');
        (ev.divisions || []).forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id; opt.textContent = d.name;
            divFilter.appendChild(opt);
        });
        return ev;
    } catch (e) {
        document.getElementById('submissions-container').innerHTML =
            `<div class="result-box result-error">${e.message}</div>`;
        throw e;
    }
}

async function loadTab(tab) {
    _currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    try {
        const key = tab === 'nominations' ? 'nominations' : 'votes';
        const r = await API.get(`${API_BASE}/events/${EVENT_ID}/${key}`);
        _currentData[key] = r[key] || [];
        renderTeams();
    } catch (e) {
        document.getElementById('submissions-container').innerHTML =
            `<div class="result-box result-error">${e.message}</div>`;
    }
}

function renderTeams() {
    const divId = document.getElementById('division-filter').value;
    const tab = _currentTab;
    const data = _currentData[tab];
    const categories = _currentData.categories.filter(c =>
        c.fill_type === 'nomination' || tab === 'votes'
    );
    const catMap = {};
    categories.forEach(c => { catMap[c.id] = c; });

    // Group submissions by team
    const teamGroups = {};
    data.forEach(d => {
        const tid = d.team_id;
        if (!teamGroups[tid]) {
            teamGroups[tid] = {
                team_id: tid,
                team_name: d.team_name || `Team ${tid}`,
                division_name: d.division_name || '',
                division_id: d.division_id,
                submissions: [],
            };
        }
        teamGroups[tid].submissions.push(d);
    });

    // If division filter active, also fetch all teams to show which teams exist but haven't submitted
    // For now, only show teams that have submitted

    let teams = Object.values(teamGroups);
    if (divId) teams = teams.filter(t => t.division_id === parseInt(divId));

    // Sort by team name
    teams.sort((a, b) => a.team_name.localeCompare(b.team_name));

    document.getElementById('summary-count').textContent = `${teams.length} teams`;

    if (!teams.length) {
        document.getElementById('submissions-container').innerHTML =
            '<p style="color:var(--text-secondary);text-align:center;padding:2rem;">No submissions yet.</p>';
        return;
    }

    let html = '';
    teams.forEach((team, idx) => {
        const isRejected = team.submissions.some(s => s.status === 'rejected');
        html += `<div class="team-card" data-team-id="${team.team_id}">`;
        html += `<div class="team-card-header" onclick="toggleTeam(${team.team_id})">`;
        html += `<div style="display:flex;align-items:center;gap:0.5rem;">`;
        html += `<span class="expand-icon" id="expand-${team.team_id}">▶</span>`;
        html += `<span class="team-name">${escHtml(team.team_name)}</span>`;
        if (isRejected) html += `<span class="status-badge-sm rejected">Has Invalidated</span>`;
        html += `</div>`;
        html += `<div class="team-meta">`;
        html += `<span>${escHtml(team.division_name || `Div ${team.division_id}`)}</span>`;
        html += `<span>${team.submissions.length}/${categories.length} categories</span>`;
        html += `<span>${team.submissions.filter(s => s.status === 'accepted').length} accepted</span>`;
        html += `</div></div>`;

        html += `<div class="team-card-body" id="body-${team.team_id}">`;
        html += renderTeamDetails(team, categories, catMap, tab);
        html += `</div></div>`;
    });

    document.getElementById('submissions-container').innerHTML = html;
}

function renderTeamDetails(team, categories, catMap, tab) {
    const subMap = {};
    team.submissions.forEach(s => { subMap[s.category_id] = s; });

    // Metadata from first submission
    const first = team.submissions[0] || {};
    const submittedBy = first.submitted_by || '';
    const createdAt = first.created_at || '';

    let html = '<div class="submission-meta-grid">';
    html += `<span class="label">Submitted by:</span><span>${escHtml(submittedBy)}</span>`;
    if (createdAt) {
        html += `<span class="label">Submitted at:</span><span>${escHtml(createdAt)}</span>`;
    }
    html += '</div>';

    // Show invalidated banners if any
    team.submissions.filter(s => s.status === 'rejected').forEach(s => {
        const cat = catMap[s.category_id] || {};
        html += `<div class="invalidated-banner">`;
        html += `<span><strong>${escHtml(cat.name || `Category ${s.category_id}`)}</strong> — Invalidated: ${escHtml(s.invalidation_reason || 'No reason given')}</span>`;
        html += `</div>`;
    });

    // Submission table
    html += '<table class="submission-table"><thead><tr>';
    if (tab === 'nominations') {
        html += '<th style="width:30%;">Category</th><th>Response</th><th style="width:80px;">Status</th><th style="width:90px;"></th>';
    } else {
        html += '<th style="width:30%;">Category</th><th>Votes</th><th style="width:80px;">Status</th><th style="width:90px;"></th>';
    }
    html += '</tr></thead><tbody>';

    categories.forEach(cat => {
        const sub = subMap[cat.id];
        html += '<tr>';
        html += `<td><span class="cat-name">${escHtml(cat.name)}</span></td>`;
        if (sub) {
            if (tab === 'nominations') {
                html += `<td><div class="response-text">${escHtml(sub.response)}</div></td>`;
            } else {
                const choices = [sub.choice_1];
                if (sub.choice_2) choices.push(`2nd: ${sub.choice_2}`);
                if (sub.choice_3) choices.push(`3rd: ${sub.choice_3}`);
                html += `<td><div class="vote-choices">${choices.map(c => `<span class="vote-choice">${escHtml(c)}</span>`).join('')}</div></td>`;
            }
            html += `<td><span class="status-badge-sm ${sub.status}">${sub.status}</span></td>`;
            if (sub.status !== 'rejected') {
                const ep = tab === 'nominations' ? 'nominations' : 'votes';
                const displayVal = tab === 'nominations' ? sub.response : `${sub.choice_1} / ${sub.choice_2 || '—'} / ${sub.choice_3 || '—'}`;
                html += `<td><button class="btn btn-danger" style="font-size:0.75rem;padding:0.15rem 0.5rem;" onclick="openInvalidate('${ep}', ${sub.id}, '${escHtml(cat.name)}', '${escHtml(team.team_name)}', \`${escHtml(displayVal)}\`)">Invalidate</button></td>`;
            } else {
                html += '<td></td>';
            }
        } else {
            html += `<td colspan="3" style="color:var(--text-secondary);font-size:0.8rem;text-align:center;">Not submitted</td>`;
        }
        html += '</tr>';
    });

    html += '</tbody></table>';
    return html;
}

function toggleTeam(teamId) {
    const body = document.getElementById(`body-${teamId}`);
    const icon = document.getElementById(`expand-${teamId}`);
    const isOpen = body.classList.toggle('open');
    icon.classList.toggle('open', isOpen);
}

function openInvalidate(endpoint, id, catName, teamName, currentValue) {
    _invalidateTarget = { endpoint, id };
    document.getElementById('invalidate-cat-name').textContent = `Category: ${catName}`;
    document.getElementById('invalidate-team-name').textContent = `Team: ${teamName}`;
    document.getElementById('invalidate-current-value').textContent = `Current: ${currentValue}`;
    document.getElementById('invalidate-reason').value = '';
    document.getElementById('invalidate-modal').style.display = 'flex';
}

function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/`/g,'&#96;');
}

// ── Tab switching ──
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => loadTab(btn.dataset.tab));
});

document.getElementById('division-filter').addEventListener('change', renderTeams);

// ── Invalidation ──
document.getElementById('btn-confirm-invalidate').addEventListener('click', async () => {
    if (!_invalidateTarget) return;
    const reason = document.getElementById('invalidate-reason').value.trim();
    if (!reason) { API.toast('Reason required', 'warning'); return; }
    try {
        const { endpoint, id } = _invalidateTarget;
        await API.request('PUT', `${API_BASE}/events/${EVENT_ID}/${endpoint}/${id}/invalidate`, { reason });
        API.toast('Invalidated', 'success');
        document.getElementById('invalidate-modal').style.display = 'none';
        loadTab(_currentTab);
    } catch (e) { API.toast(e.message, 'error'); }
    _invalidateTarget = null;
});

document.getElementById('btn-cancel-invalidate').addEventListener('click', () => {
    document.getElementById('invalidate-modal').style.display = 'none';
    _invalidateTarget = null;
});

// ── Init ──
loadEvent().then(() => loadTab('nominations'));
</script>
{% endblock %}
