{% extends "admin/layout.html" %}
{% block title %}Submissions #{{ event_id }} - Drawbridge Admin{% endblock %}
{% block content %}
<style>
/* ── Table ── */
.submissions-table {
    min-width: 900px;
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.85rem;
    table-layout: fixed;
}
.submissions-table th, .submissions-table td {
    padding: 0.55rem 0.75rem;
    text-align: left;
    vertical-align: top;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
}
.submissions-table th:first-child,
.submissions-table td:first-child {
    border-left: 1px solid var(--border);
}
.submissions-table thead th {
    background: #1e1e2e;
    position: sticky;
    top: 0;
    z-index: 2;
    white-space: nowrap;
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-secondary);
    border-bottom: 2px solid var(--accent);
}
.submissions-table thead th.cat-header {
    min-width: 180px;
    width: 180px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text);
}
.submissions-table tbody tr { transition: background 0.15s; }
.submissions-table tbody tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.submissions-table tbody tr:hover td { background: rgba(255,255,255,0.05); }
.submissions-table .team-name {
    font-weight: 600;
    white-space: nowrap;
    color: var(--accent);
}
.submissions-table .team-row:last-child td { border-bottom: none; }
.submissions-table tr.team-row.invalidated { opacity: 0.55; }
.submissions-table tr.team-row.invalidated td { background: #1a0f0f !important; }
.submissions-table .response-cell {
    word-break: break-word;
    line-height: 1.4;
    background: rgba(255,255,255,0.03);
    border-radius: 3px;
    padding: 0.4rem 0.6rem;
}
.submissions-table .vote-choices {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}
.submissions-table .vote-choice {
    font-size: 0.8rem;
    padding: 0.15rem 0;
}
.submissions-table .vote-choice .pref {
    color: var(--text-secondary);
    font-size: 0.7rem;
    margin-right: 0.4rem;
    font-weight: 600;
}
.submissions-table .submitted-by-cell {
    font-size: 0.78rem;
    color: var(--text-secondary);
    white-space: nowrap;
}
.submissions-table .team-actions {
    white-space: nowrap;
}
.submissions-table td:first-child {
    color: var(--text-secondary);
    font-size: 0.78rem;
    text-align: center;
    width: 36px;
}

/* ── Status dots ── */
.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 0.35rem;
    vertical-align: middle;
}
.status-dot.accepted { background: #4caf50; box-shadow: 0 0 4px rgba(76,175,80,0.4); }
.status-dot.rejected { background: #f44336; box-shadow: 0 0 4px rgba(244,67,54,0.4); }
.status-dot.pending { background: #ff9800; box-shadow: 0 0 4px rgba(255,152,0,0.4); }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 2px solid var(--border); }
.tab-btn {
    padding: 0.55rem 1.4rem;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Filter bar ── */
.filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
.filter-bar label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }

/* ── Table wrapper ── */
.table-wrapper-sub {
    overflow-x: auto;
    overflow-y: auto;
    max-height: 75vh;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
}

/* ── Invalidation badge ── */
.invalidation-badge {
    display: inline-block;
    padding: 0.12rem 0.4rem;
    border-radius: 3px;
    font-size: 0.7rem;
    font-weight: 600;
    background: rgba(244,67,54,0.15);
    color: #f44336;
    margin-top: 0.25rem;
}

/* ── Invalidation modal ── */
#invalidate-modal {
    display: none !important;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}
</style>
<div class="page-header">
    <a href="/admin/awards/{{ event_id }}" style="color:var(--text-secondary);font-size:0.85rem;text-decoration:none;">← Award Event</a>
    <h1 style="margin-top:0.25rem;" id="page-title">Submissions</h1>
</div>

<div class="tab-bar">
    <button class="tab-btn active" data-tab="nominations">Nominations</button>
    <button class="tab-btn" data-tab="votes">Votes</button>
</div>

<div class="filter-bar">
    <label>Division:</label>
    <select id="division-filter" class="form-input" style="width:auto;font-size:0.85rem;">
        <option value="">All Divisions</option>
    </select>
    <span id="summary-count" style="font-size:0.85rem;color:var(--text-secondary);margin-left:auto;"></span>
</div>

<div id="submissions-container" class="table-wrapper-sub"></div>

<!-- Team invalidation modal -->
<div id="invalidate-modal" style="display:none">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:2rem;max-width:450px;width:90%;">
        <h3 style="margin-bottom:0.5rem;">Invalidate Entire Submission</h3>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:0.25rem;" id="invalidate-team-name"></p>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem;" id="invalidate-sub-type"></p>
        <textarea id="invalidate-reason" class="form-input" rows="3" style="width:100%;" placeholder="Reason for invalidation..."></textarea>
        <div class="action-grid" style="margin-top:1rem;">
            <button class="btn btn-danger" id="btn-confirm-invalidate">Invalidate All</button>
            <button class="btn btn-secondary" id="btn-cancel-invalidate">Cancel</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const EVENT_ID = {{ event_id }};
const API_BASE = '/admin/api/awards';
let _currentTab = 'nominations';
let _currentData = { nominations: [], votes: [], categories: [], teams: [] };
let _invalidateTarget = null;

async function loadEvent() {
    try {
        const ev = await API.get(`${API_BASE}/events/${EVENT_ID}`);
        document.getElementById('page-title').textContent = `Submissions — ${ev.name}`;
        _currentData.categories = ev.categories || [];
        const divFilter = document.getElementById('division-filter');
        (ev.divisions || []).forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id; opt.textContent = d.name;
            divFilter.appendChild(opt);
        });
        return ev;
    } catch (e) {
        document.getElementById('submissions-container').innerHTML =
            `<div class="result-box result-error">${e.message}</div>`;
        throw e;
    }
}

async function loadTab(tab) {
    _currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    try {
        const key = tab === 'nominations' ? 'nominations' : 'votes';
        const r = await API.get(`${API_BASE}/events/${EVENT_ID}/${key}`);
        _currentData[key] = r[key] || [];
        renderTable();
    } catch (e) {
        document.getElementById('submissions-container').innerHTML =
            `<div class="result-box result-error">${e.message}</div>`;
    }
}

function renderTable() {
    const divId = document.getElementById('division-filter').value;
    const tab = _currentTab;
    const data = _currentData[tab];
    const allCategories = _currentData.categories;
    const visibleCategories = allCategories.filter(c =>
        tab === 'nominations' ? c.fill_type === 'nomination' : true
    );

    // Group by team
    const teamMap = {};
    data.forEach(d => {
        if (!teamMap[d.team_id]) {
            teamMap[d.team_id] = {
                team_id: d.team_id,
                team_name: d.team_name,
                division_id: d.division_id,
                division_name: d.division_name || '',
                submitted_by: d.submitted_by || '',
                submissions: {},
                hasRejected: false,
            };
        }
        teamMap[d.team_id].submissions[d.category_id] = d;
        if (d.status === 'rejected') teamMap[d.team_id].hasRejected = true;
        if (d.submitted_by) teamMap[d.team_id].submitted_by = d.submitted_by;
    });

    let teams = Object.values(teamMap);
    if (divId) teams = teams.filter(t => t.division_id === parseInt(divId));
    teams.sort((a, b) => a.team_name.localeCompare(b.team_name));

    document.getElementById('summary-count').textContent = `${teams.length} teams`;

    if (!teams.length) {
        document.getElementById('submissions-container').innerHTML =
            '<p style="color:var(--text-secondary);text-align:center;padding:2rem;">No submissions yet.</p>';
        return;
    }

    let html = '<table class="submissions-table"><thead><tr>';
    html += '<th style="width:40px;">#</th>';
    html += '<th style="width:160px;">Team</th>';
    html += '<th style="width:100px;">Division</th>';
    visibleCategories.forEach(c => {
        html += `<th class="cat-header">${escHtml(c.name)}</th>`;
    });
    html += '<th style="width:120px;">Submitted By</th>';
    html += '<th style="width:90px;">Status</th>';
    html += '<th style="width:100px;">Actions</th>';
    html += '</tr></thead><tbody>';

    teams.forEach((team, idx) => {
        const rowClass = team.hasRejected ? 'team-row invalidated' : 'team-row';
        html += `<tr class="${rowClass}" data-team-id="${team.team_id}">`;
        html += `<td>${idx + 1}</td>`;
        html += `<td class="team-name">${escHtml(team.team_name)}</td>`;
        html += `<td>${escHtml(team.division_name)}</td>`;

        visibleCategories.forEach(cat => {
            const sub = team.submissions[cat.id];
            if (sub) {
                html += '<td class="response-cell">';
                if (tab === 'nominations') {
                    html += escHtml(sub.response);
                } else {
                    html += '<div class="vote-choices">';
                    const labels = ['1st', '2nd', '3rd'];
                    [sub.choice_1, sub.choice_2, sub.choice_3].forEach((c, i) => {
                        if (c) html += `<span class="vote-choice"><span class="pref">${labels[i]}:</span>${escHtml(c)}</span>`;
                    });
                    html += '</div>';
                }
                if (sub.status === 'rejected') {
                    html += `<div class="invalidation-badge">Invalidated${sub.invalidation_reason ? ': ' + escHtml(sub.invalidation_reason) : ''}</div>`;
                }
                html += '</td>';
            } else {
                html += '<td style="color:var(--text-secondary);font-size:0.75rem;text-align:center;">—</td>';
            }
        });

        html += `<td class="submitted-by-cell">${escHtml(team.submitted_by)}</td>`;
        html += `<td><span class="status-dot ${team.hasRejected ? 'rejected' : 'accepted'}"></span>${team.hasRejected ? 'Rejected' : 'Accepted'}</td>`;
        html += `<td class="team-actions">`;
        html += `<button class="btn btn-danger" style="font-size:0.75rem;padding:0.2rem 0.5rem;" onclick="openInvalidate(${team.team_id}, '${escHtml(team.team_name)}')">Invalidate</button>`;
        html += `</td>`;
        html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('submissions-container').innerHTML = html;
}

function openInvalidate(teamId, teamName) {
    _invalidateTarget = { team_id: teamId };
    document.getElementById('invalidate-team-name').textContent = `Team: ${teamName}`;
    document.getElementById('invalidate-sub-type').textContent = `All ${_currentTab} for this team will be invalidated.`;
    document.getElementById('invalidate-reason').value = '';
    document.getElementById('invalidate-modal').style.display = 'flex';
}

function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Tab switcher ──
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => loadTab(btn.dataset.tab));
});

document.getElementById('division-filter').addEventListener('change', renderTable);

// ── Team invalidation ──
document.getElementById('btn-confirm-invalidate').addEventListener('click', async () => {
    if (!_invalidateTarget) return;
    const reason = document.getElementById('invalidate-reason').value.trim();
    if (!reason) { API.toast('Reason required', 'warning'); return; }
    const { team_id } = _invalidateTarget;
    const endpoint = _currentTab === 'nominations' ? 'nominations' : 'votes';
    try {
        const r = await API.request('POST', `${API_BASE}/events/${EVENT_ID}/${endpoint}/invalidate-team/${team_id}`, { reason });
        API.toast(`Invalidated ${r.invalidated || 0} entries`, 'success');
        document.getElementById('invalidate-modal').style.display = 'none';
        loadTab(_currentTab);
    } catch (e) { API.toast(e.message, 'error'); }
    _invalidateTarget = null;
});

document.getElementById('btn-cancel-invalidate').addEventListener('click', () => {
    document.getElementById('invalidate-modal').style.display = 'none';
    _invalidateTarget = null;
});

// ── Init ──
loadEvent().then(() => loadTab('nominations'));
</script>
{% endblock %}
