<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Drawbridge Admin{% endblock %}</title>
    <link rel="stylesheet" href="/static/admin.css?v=20260606">
</head>
<body>
    <nav class="admin-nav">
        <div class="nav-brand">
            <span class="nav-logo">🛡️</span>
            <span class="nav-title">Drawbridge Admin</span>
        </div>
        <div class="nav-links">
            <a href="/admin/dashboard" class="nav-link">Dashboard</a>
            <a href="/admin/launchpad" class="nav-link">Launchpad</a>
            <a href="/admin/tournaments" class="nav-link">Tournaments</a>
            <a href="/admin/matches" class="nav-link">Matches</a>
            <a href="/admin/sync" class="nav-link">Sync</a>
            <a href="/admin/templates" class="nav-link">Templates</a>
            <a href="/admin/awards" class="nav-link">Awards</a>
            <a href="/admin/logs" class="nav-link">Logs</a>
        </div>
        <div class="nav-user">
            {% if user %}
            <span class="nav-username">{{ user.username }}</span>
            <a href="/admin/auth/logout" class="nav-logout">Logout</a>
            {% endif %}
        </div>
    </nav>
    <main class="admin-main">
        {% block content %}{% endblock %}
    </main>
    <div id="toast-container"></div>
    <script src="/static/admin.js?v=20260606"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
